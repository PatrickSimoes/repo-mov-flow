services:
  postgres:
    image: postgres:16-alpine
    container_name: mov-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - movflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - movflow-network

  api:
    build:
      context: ./api-mov-flow
      dockerfile: Dockerfile
    container_name: mov-flow-api
    restart: unless-stopped
    env_file:
      - ./api-mov-flow/.env.production
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/v1/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - movflow-network

  frontend:
    build:
      context: ./frontend-mov-flow
      dockerfile: Dockerfile
    container_name: mov-flow-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ > /dev/null']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - movflow-network

volumes:
  movflow_postgres_data:

networks:
  movflow-network:
    driver: bridge
